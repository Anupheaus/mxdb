name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  PNPM_VERSION: '10'
  NODE_VERSION: '20'

jobs:
  # ── PREPARE ────────────────────────────────────────────────────────────────
  Prepare:
    name: Install Dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Setup pnpm, node, and install
        uses: Anupheaus/ci-templates/.github/actions/pnpm-setup@v1
        with:
          pnpm-version: ${{ env.PNPM_VERSION }}
          node-version: ${{ env.NODE_VERSION }}
          node-auth-token: ${{ secrets.GITHUB_TOKEN }}
          workspace-repos: 'Anupheaus/common Anupheaus/react-ui Anupheaus/nexus'
          install-args: '--no-frozen-lockfile'

  # ── VALIDATE ───────────────────────────────────────────────────────────────
  Validate:
    name: Validate (type-check, lint, audit)
    needs: Prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Setup pnpm, node, and install
        uses: Anupheaus/ci-templates/.github/actions/pnpm-setup@v1
        with:
          pnpm-version: ${{ env.PNPM_VERSION }}
          node-version: ${{ env.NODE_VERSION }}
          node-auth-token: ${{ secrets.GITHUB_TOKEN }}
          workspace-repos: 'Anupheaus/common Anupheaus/react-ui Anupheaus/nexus'
          install-args: '--no-frozen-lockfile'

      - name: Type check
        run: pnpm exec tsc --noEmit --project tsconfig.ci.json

      - name: Lint
        run: pnpm run lint

      - name: Security audit
        run: pnpm audit --audit-level=high

      - name: Secret detection (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      - name: Filesystem security scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ── TEST (Unit) ─────────────────────────────────────────────────────────────
  Test:
    name: Unit Tests
    needs: Prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Setup pnpm, node, and install
        uses: Anupheaus/ci-templates/.github/actions/pnpm-setup@v1
        with:
          pnpm-version: ${{ env.PNPM_VERSION }}
          node-version: ${{ env.NODE_VERSION }}
          node-auth-token: ${{ secrets.GITHUB_TOKEN }}
          workspace-repos: 'Anupheaus/common Anupheaus/react-ui Anupheaus/nexus'
          install-args: '--no-frozen-lockfile'

      - name: Run unit tests with coverage
        run: pnpm run test:ci -- --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  # ── TEST (CRUD E2E) ─────────────────────────────────────────────────────────
  Test-CRUD:
    name: CRUD E2E Tests
    needs: Prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Setup pnpm, node, and install
        uses: Anupheaus/ci-templates/.github/actions/pnpm-setup@v1
        with:
          pnpm-version: ${{ env.PNPM_VERSION }}
          node-version: ${{ env.NODE_VERSION }}
          node-auth-token: ${{ secrets.GITHUB_TOKEN }}
          workspace-repos: 'Anupheaus/common Anupheaus/react-ui Anupheaus/nexus'
          install-args: '--no-frozen-lockfile'

      - name: Run CRUD E2E tests
        run: pnpm run test:crud

  # ── TEST (Performance E2E) — master only ────────────────────────────────────
  Test-Performance:
    name: Performance E2E Tests
    needs: Prepare
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Setup pnpm, node, and install
        uses: Anupheaus/ci-templates/.github/actions/pnpm-setup@v1
        with:
          pnpm-version: ${{ env.PNPM_VERSION }}
          node-version: ${{ env.NODE_VERSION }}
          node-auth-token: ${{ secrets.GITHUB_TOKEN }}
          workspace-repos: 'Anupheaus/common Anupheaus/react-ui Anupheaus/nexus'
          install-args: '--no-frozen-lockfile'

      - name: Run performance E2E tests
        run: pnpm run test:performance

  # ── TEST (Stress) — master only ─────────────────────────────────────────────
  Test-Stress:
    name: Stress Tests
    needs: Prepare
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Setup pnpm, node, and install
        uses: Anupheaus/ci-templates/.github/actions/pnpm-setup@v1
        with:
          pnpm-version: ${{ env.PNPM_VERSION }}
          node-version: ${{ env.NODE_VERSION }}
          node-auth-token: ${{ secrets.GITHUB_TOKEN }}
          workspace-repos: 'Anupheaus/common Anupheaus/react-ui Anupheaus/nexus'
          install-args: '--no-frozen-lockfile'

      - name: Run stress tests
        run: pnpm run test:stress

  # ── PUBLISH — master only, after all tests ───────────────────────────────────
  Publish:
    name: Build and Publish
    needs: [Validate, Test, Test-CRUD, Test-Performance, Test-Stress]
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Setup pnpm, node, and install
        uses: Anupheaus/ci-templates/.github/actions/pnpm-setup@v1
        with:
          pnpm-version: ${{ env.PNPM_VERSION }}
          node-version: ${{ env.NODE_VERSION }}
          node-auth-token: ${{ secrets.GITHUB_TOKEN }}
          workspace-repos: 'Anupheaus/common Anupheaus/react-ui Anupheaus/nexus'
          fetch-depth: '0'
          install-args: '--no-frozen-lockfile'

      - name: Build
        run: pnpm run build

      - name: Bump version
        uses: phips28/gh-action-bump-version@master
        with:
          commit-message: 'CI: bumps version to {{version}} [skip ci]'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Pack
        run: pnpm pack

      - name: Publish to GitHub Packages
        run: pnpm publish $(ls *.tgz) --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
